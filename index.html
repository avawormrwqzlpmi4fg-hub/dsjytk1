    <style>
        /* 基础重置与全局设置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7; 
            color: #4a3b3b;
            line-height: 1.7; 
        }

        /* 移动端主容器 */
        .container {
            max-width: 480px; margin: 0 auto;
            background: linear-gradient(135deg, #fffaf7 0%, #ffe8e0 100%);
            min-height: 100vh;
            padding: 40px 20px 120px 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 首屏视觉区 */
        .hero { text-align: center; margin-bottom: 30px; }
        .profile-pic {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 4px solid #fff;
            box-shadow: 0 8px 16px rgba(255, 160, 122, 0.2);
            margin-bottom: 15px;
        }
        .hero h1 { font-size: 24px; margin-bottom: 8px; color: #332828; }
        .hero p { font-size: 15px; color: #7a6565; }

        /* 标签区 */
        .tags {
            display: flex; justify-content: center; flex-wrap: wrap;
            gap: 10px; margin-bottom: 30px;
        }
        .tag {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 6px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 500; color: #d86c58; border: 1px solid #fbdcd5;
        }

        /* 自我介绍区 */
        .about-section {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px; border-radius: 16px; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(216, 108, 88, 0.05);
            border-left: 4px solid #d86c58; 
        }
        .about-section h2 { font-size: 17px; margin-bottom: 12px; color: #d86c58; }
        .about-section p { font-size: 14px; margin-bottom: 12px; text-align: justify; }
        .about-section p:last-child { margin-bottom: 0; font-weight: 500; color: #d86c58; }

        /* 照片墙 */
        .gallery {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 20px;
        }
        .gallery-img {
            width: 100%; height: auto; aspect-ratio: 3 / 4;
            border-radius: 12px; object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 底部悬浮 WhatsApp 按钮区 */
        .sticky-footer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            padding: 15px 20px 25px 20px; border-top: 1px solid #f2f2f2; text-align: center; z-index: 100;
        }
        .cta-text { font-size: 13px; color: #7a6565; margin-bottom: 10px; font-weight: 500; }
        .whatsapp-btn {
            display: flex; align-items: center; justify-content: center;
            background-color: #25D366; color: white; text-decoration: none;
            padding: 14px 20px; border-radius: 30px; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); animation: pulse 2s infinite; cursor: pointer;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero">
            <img src="images/avatar.jpg" alt="我的头像" class="profile-pic">
            <h1>你好！很高兴认识你 👋</h1>
            <p>在喧嚣的世界里，期待与你开启一段真诚的对话。</p>
        </header>

        <section class="tags">
            <span class="tag">✨ 目前单身</span>
            <span class="tag">✈️ 热爱生活</span>
            <span class="tag">🎵 寻找同频的你</span>
        </section>

        <section class="about-section">
            <h2>关于我</h2>
            <p>目前单身。虽然每天的生活都很充实，但每当遇到有趣的风景、吃到好吃的餐厅时，总觉得如果能有一个人分享，快乐一定会翻倍。</p>
            <p>我性格真诚、独立，对世界保持着好奇心。也许我们之前在各自的轨迹上忙碌，但我很期待能在这里遇到那个“刚刚好”的你。不需要刻意伪装，只希望能拥有一段轻松、同频的交往关系。</p>
            <p>如果你也单身，并且想认识一个有趣的新朋友，现在就和我打个招呼吧！</p>
        </section>

        <section class="gallery">
            <img src="images/photo1.jpg" alt="生活照1" class="gallery-img">
            <img src="images/photo2.jpg" alt="生活照2" class="gallery-img">
            <img src="images/photo3.jpg" alt="生活照3" class="gallery-img">
            <img src="images/photo4.jpg" alt="生活照4" class="gallery-img">
        </section>
    </div>

    <div class="sticky-footer">
        <p class="cta-text">心动不如行动，点击下方按钮直接和我聊天 👇</p>
        <a href="#" id="whatsapp-btn" class="whatsapp-btn">
            💬 添加我的 whatsapp，认识一下
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. WhatsApp 客服号码池配置
            const whatsappPool = [
                 { phone: "60165190616", text: "你好！很高兴认识你👋" },
                 { phone: "60169515816", text: "你好！很高兴认识你👋" }
            ];

            // 2. 24小时防撞单分配缓存逻辑
            const LOCK_DURATION = 180 * 24 * 60 * 60 * 1000; // 锁定24小时
            const now = new Date().getTime();
            let selectedTarget = null;
            const cachedShuntData = localStorage.getItem('wa_dating_assigned');
            
            if (cachedShuntData) {
                try {
                    const parsedData = JSON.parse(cachedShuntData);
                    if (now - parsedData.timestamp < LOCK_DURATION) {
                        selectedTarget = parsedData.target;
                    }
                } catch (err) {
                    localStorage.removeItem('wa_dating_assigned');
                }
            }

            if (!selectedTarget) {
                const randomIndex = Math.floor(Math.random() * whatsappPool.length);
                selectedTarget = whatsappPool[randomIndex];
                localStorage.setItem('wa_dating_assigned', JSON.stringify({ target: selectedTarget, timestamp: now }));
            }

            // 3. 操作系统精确嗅探
            const targetPhone = selectedTarget.phone;
            const encodedText = encodeURIComponent(selectedTarget.text);
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(ua);
            
            let userOS = 'Other';
            if (isAndroid) userOS = 'Android';
            else if (/iPad|iPhone|iPod/i.test(ua)) userOS = 'iOS';
            else if (/Mac/i.test(ua)) userOS = 'Mac';
            else if (/Windows/i.test(ua)) userOS = 'Windows';

            // 4. 构建底层协议链
            const androidIntent = `intent://send?phone=${targetPhone}&text=${encodedText}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
            const universalSafeUrl = `https://api.whatsapp.com/send?phone=${targetPhone}&text=${encodedText}`;

            let targetUrl = universalSafeUrl; 
            if (isAndroid) {
                targetUrl = androidIntent; 
            }
            
            // 绑定协议链接到悬浮按钮
            const whatsappBtn = document.getElementById('whatsapp-btn');
            whatsappBtn.href = targetUrl;

            // 5. 基于点击动作的精准 Contact 追踪 (已更新为 TikTok 代码)
            let eventFired = false;
            function fireContactEvent() {
                // 检查 ttq 对象是否存在，确保代码安全执行
                if (!eventFired && typeof ttq !== 'undefined') {
                    // 触发 TikTok 像素的 Contact 事件并传入自定义参数
                    ttq.track('Contact', {
                        assigned_whatsapp: targetPhone,       
                        user_os: userOS,                      
                        content_name: 'dating_profile_add'    
                    });
                    eventFired = true; 
                }
            }

            // 监听按钮点击事件
            whatsappBtn.addEventListener('click', function() {
                fireContactEvent();
            });

        });
    </script>
</body>
</html>
